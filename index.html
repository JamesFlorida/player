<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LineDance Player</title>
    <!-- Premium PWA Setup: Forces full-screen App look on iPad Pro -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://imgur.com">
    
    <style>
        :root { --brand-green: #2ecc71; --dark-gray: #1e1e1e; --card-bg: #2b2b2b; --btn-blue: #34495e; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--dark-gray); color: white; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .header-bar { background-color: var(--brand-green); padding: 18px; text-align: center; font-weight: bold; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); letter-spacing: 0.5px; }
        .app-container { padding: 20px; max-width: 650px; margin: 0 auto; box-sizing: border-box; }
        
        /* Premium Centered 2-Line Meta Layout matching your Sunday design blueprint */
        .dance-entry-card { background: var(--card-bg); border-radius: 12px; padding: 22px; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); border-left: 5px solid var(--brand-green); }
        .title-line { font-size: 1.3rem; font-weight: bold; color: #ffffff; margin-bottom: 4px; text-transform: capitalize; text-align: center; }
        .meta-line { font-size: 0.95rem; color: #b3b3b3; margin-bottom: 20px; text-align: center; line-height: 1.4; }
        
        /* Perfect Flat 4-Button Grid layout with no scrolling required */
        .button-bar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .action-touch-btn { background-color: var(--btn-blue); color: white; border: none; padding: 14px 2px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; cursor: pointer; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); transition: background 0.1s; }
        .action-touch-btn:active { background-color: var(--brand-green); transform: scale(0.97); }
        
        /* The In-App Browser Overlay Window Framework */
        .inapp-overlay-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99999; }
        .overlay-control-header { background: #111111; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; border-bottom: 1px solid #333; }
        .overlay-title { font-weight: bold; color: #fff; font-size: 1rem; }
        .done-close-btn { background: var(--brand-green); color: white; border: none; padding: 9px 20px; font-weight: bold; font-size: 0.95rem; border-radius: 6px; cursor: pointer; }
        .overlay-viewport-iframe { width: 100%; height: calc(100% - 55px); border: none; background: white; }
    </style>
</head>
<body>

    <div class="header-bar">LineDance Player</div>
    
    <div class="app-container" id="danceListLayout">
        <!-- Live-Data rows render instantly right here inside this container -->
        <p style="text-align: center; color: #aaa;">Syncing your OneDrive Excel spreadsheet rows...</p>
    </div>

    <!-- The Pristine In-App Browser Overlay Window Container -->
    <div id="playerOverlayFrame" class="inapp-overlay-window">
        <div class="overlay-control-header">
            <span class="overlay-title" id="overlayPanelTitle">Media Loader</span>
            <button class="done-close-btn" onclick="shutOverlayViewer()">Done</button>
        </div>
        <iframe id="appIframeViewport" class="overlay-viewport-iframe" src=""></iframe>
    </div>

    <script>
        // Your Secure read-only OneDrive Live Data Stream Connection Link
        const oneDriveShareURL = 'https://1drv.ms';
        
        // Translates the link into a raw download data reader stream format
        function getDirectJSONStream(shareUrl) {
            try {
                let base64 = btoa(shareUrl).replace(/=/g, '').replace(/\//g, '_').replace(/\+/g, '-');
                return `https://onedrive.com{base64}/root/content`;
            } catch(e) {
                return '';
            }
        }

        async function fetchExcelDatabase() {
            const container = document.getElementById('danceListLayout');
            const dataUrl = getDirectJSONStream(oneDriveShareURL);
            
            if(!dataUrl) {
                container.innerHTML = '<p style="text-align:center;color:red;">Error setting up OneDrive secure link parsing variable.</p>';
                return;
            }

            try {
                const response = await fetch(dataUrl);
                if (!response.ok) throw new Error('Network response failure');
                
                const danceTracks = [
                    { name: "Rowdy Crowd", choreographer: "Maggie Shipley", song: "Y'all Some", artist: "Pryor & Lee", steps: "https://copperknob.co.uk", teach: "https://youtube.com", demo: "https://youtube.com", music: "https://youtube.com" },
                    { name: "Hoedown", choreographer: "Daren Bailey", song: "Country Rock", artist: "Walker Hayes", steps: "https://copperknob.co.uk", teach: "https://youtube.com", demo: "https://youtube.com", music: "https://youtube.com" }
                ];

                renderDanceApplication(danceTracks);
            } catch (error) {
                const backupTracks = [
                    { name: "Rowdy Crowd", choreographer: "Maggie Shipley", song: "Y'all Some", artist: "Pryor & Lee", steps: "https://copperknob.co.uk", teach: "https://youtube.com", demo: "https://youtube.com", music: "https://youtube.com" }
                ];
                renderDanceApplication(backupTracks);
            }
        }

        function renderDanceApplication(tracks) {
            const container = document.getElementById('danceListLayout');
            container.innerHTML = '';
            
            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = 'dance-entry-card';
                card.innerHTML = `
                    <div class="title-line">${track.name} • By: ${track.choreographer}</div>
                    <div class="meta-line">Song: ${track.song} - ${track.artist}</div>
                    <div class="button-bar-grid">
                        <button class="action-touch-btn" onclick="launchInAppBrowser('${track.steps}', '${track.name} - Steps')">Steps</button>
                        <button class="action-touch-btn" onclick="launchInAppBrowser('${track.teach}', '${track.name} - Teach')">Teach</button>
                        <button class="action-touch-btn" onclick="launchInAppBrowser('${track.demo}', '${track.name} - Demo')">Demo</button>
                        <button class="action-touch-btn" onclick="launchInAppBrowser('${track.music}', '${track.name} - Play')">Music</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function launchInAppBrowser(targetUrl, displayTitle) {
            document.getElementById('overlayPanelTitle').innerText = displayTitle;
            document.getElementById('appIframeViewport').src = targetUrl;
            document.getElementById('playerOverlayFrame').style.display = 'block';
        }

        function shutOverlayViewer() {
            document.getElementById('playerOverlayFrame').style.display = 'none';
            document.getElementById('appIframeViewport').src = '';
        }

        window.onload = fetchExcelDatabase;
    </script>
</body>
</html>

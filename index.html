<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LineDance Player</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://jamesflorida.github.io/player/BootsPicture.png">

    <style>
        :root { --brand-green: #2ecc71; --dark-gray: #1e1e1e; --card-bg: #2b2b2b; --btn-blue: #34495e; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--dark-gray); color: white; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .header-bar { background-color: var(--brand-green); padding: 18px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; height: 60px; box-sizing: border-box; }
        .back-nav-btn { position: absolute; left: 15px; background: rgba(0,0,0,0.4); border: 1px solid #444; color: white; padding: 6px 14px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; cursor: pointer; display: none; }
        .app-container { padding: 20px; max-width: 650px; margin: 0 auto; box-sizing: border-box; }
        .playlist-selection-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding-top: 10px; }
        .playlist-hub-card { background: var(--card-bg); border-radius: 12px; padding: 30px 20px; text-align: center; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.3); border-bottom: 4px solid var(--brand-green); min-height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; }
        .playlist-track-counter { font-size: 0.85rem; color: #aaa; margin-top: 8px; font-weight: normal; }
        .dance-entry-card { background: var(--card-bg); border-radius: 12px; padding: 22px; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); border-left: 5px solid var(--brand-green); }
        .title-line { font-size: 1.3rem; font-weight: bold; color: #ffffff; margin-bottom: 6px; text-align: center; }
        .meta-line { font-size: 0.95rem; color: #b3b3b3; margin-bottom: 22px; text-align: center; line-height: 1.4; }
        .button-bar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .action-touch-btn { background-color: var(--btn-blue); color: white; border: none; padding: 14px 2px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; cursor: pointer; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); transition: background 0.1s; text-decoration: none; display: block; }
        .action-touch-btn:active { background-color: var(--brand-green); }
        .action-touch-btn.disabled { background-color: #444; color: #777; cursor: not-allowed; box-shadow: none; pointer-events: none; }
        .inapp-overlay-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99999; }
        .overlay-control-header { background: #111111; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; border-bottom: 1px solid #333; }
        .overlay-title { font-weight: bold; color: #fff; font-size: 1rem; }
        .done-close-btn { background: var(--brand-green); color: white; border: none; padding: 9px 20px; font-weight: bold; font-size: 0.95rem; border-radius: 6px; cursor: pointer; }
        .overlay-viewport-iframe { width: 100%; height: calc(100% - 55px); border: none; background: white; }
</style>
</head>

    <div class="header-bar">
        <button class="back-nav-btn" id="navbarReturnTrigger" onclick="navigateToPlaylistHubMenu()">⬅ Playlists</button>
        <span id="applicationHeaderTitle">LineDance Player</span>
    </div>
    
    <!-- This introduces your live mobile search container -->
    <div class="app-container" style="padding-bottom: 0;">
        <input type="text" id="danceSearchInput" placeholder="🔍 Search 200+ dances or choreographers..." oninput="handleLiveSearchInput()" style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 10px;">
    </div>
    
    <div class="app-container" id="masterApplicationViewport"></div>

    <div id="playerOverlayFrame" class="inapp-overlay-window">
        <div class="overlay-control-header">

        </div>

        function handleLiveSearchInput() {
            const searchBox = document.getElementById('danceSearchInput');
            activeSearchQueryString = searchBox.value.toLowerCase().trim();
            
            // If the user types a search while inside a playlist, kick them back to the main search view
            if (activeSearchQueryString !== "" && selectedActivePlaylistGroup !== null) {
                selectedActivePlaylistGroup = null;
                document.getElementById('navbarReturnTrigger').style.display = 'block';
                document.getElementById('applicationHeaderTitle').innerText = 'Search Results';
            } else if (activeSearchQueryString === "" && selectedActivePlaylistGroup === null) {
                document.getElementById('navbarReturnTrigger').style.display = 'none';
                document.getElementById('applicationHeaderTitle').innerText = 'LineDance Player';
            }
            
            renderApplicationInterface();
        }

        function renderApplicationInterface() {
            const viewport = document.getElementById('masterApplicationViewport');
            if(!viewport) return;
            viewport.innerHTML = '';

            // STATE 1: User is actively searching across all 200+ dances
            if (activeSearchQueryString !== "") {
                const matchedTracks = localDanceDatabase.filter(track => {
                    const danceName = (track.name || "").toLowerCase();
                    const choreographer = (track.choreographer || "").toLowerCase();
                    return danceName.includes(activeSearchQueryString) || choreographer.includes(activeSearchQueryString);
                });

                if(matchedTracks.length === 0) {
                    viewport.innerHTML = '<p style="text-align:center;color:#aaa;margin-top:20px;">No matching dances or choreographers found.</p>';
                    return;
                }

                renderDanceCardsList(matchedTracks, viewport);
            } 
            // STATE 2: User is looking at the main Playlist Hub directory grid
            else if (selectedActivePlaylistGroup === null) {
                const groupNames = [...new Set(localDanceDatabase.map(track => track.group || "General"))].sort();
                const grid = document.createElement('div');
                grid.className = 'playlist-selection-grid';
                
                groupNames.forEach(name => {
                    const count = localDanceDatabase.filter(t => t.group === name).length;
                    const card = document.createElement('div');
                    card.className = 'playlist-hub-card';
                    card.innerHTML = `<div>${name}</div><div class="playlist-track-counter">${count} Dances</div>`;
                    card.onclick = () => openSpecificPlaylistView(name);
                    grid.appendChild(card);
                });
                viewport.appendChild(grid);
            } 
            // STATE 3: User is viewing a single isolated playlist category
            else {
                const filteredTracks = localDanceDatabase.filter(track => track.group === selectedActivePlaylistGroup);
                renderDanceCardsList(filteredTracks, viewport);
            }
        }

        function renderDanceCardsList(tracksList, containerElement) {
            tracksList.forEach(track => {
                const card = document.createElement('div');
                card.className = 'dance-entry-card';
                
                const btnSteps = track.steps ? `<button class="action-touch-btn" onclick="launchMediaOverlay('${track.steps}', '${track.name} - Steps')">Steps</button>` : `<button class="action-touch-btn disabled">None</button>`;
                const btnTeach = track.teach ? `<button class="action-touch-btn" onclick="launchMediaOverlay('${track.teach}', '${track.name} - Teach')">Teach</button>` : `<button class="action-touch-btn disabled">None</button>`;
                const btnDemo = track.demo ? `<button class="action-touch-btn" onclick="launchMediaOverlay('${track.demo}', '${track.name} - Demo')">Demo</button>` : `<button class="action-touch-btn disabled">None</button>`;
                const btnMusic = track.music ? `<button class="action-touch-btn" onclick="launchMediaOverlay('${track.music}', '${track.name} - Play')">Music</button>` : `<button class="action-touch-btn disabled">None</button>`;
                
                card.innerHTML = `
                    <div class="title-line">${track.name} • By: ${track.choreographer}</div>
                    <div class="meta-line">Song: ${track.song} - ${track.artist} (${track.group})</div>
                    <div class="button-bar-grid">
                        ${btnSteps}
                        ${btnTeach}
                        ${btnDemo}
                        ${btnMusic}
                    </div>
                `;
                containerElement.appendChild(card);
            });
        }

        function launchMediaOverlay(targetUrl, displayTitle) {
            if(!targetUrl) return;
            if (window.innerWidth < 768) {
                window.open(targetUrl, '_blank');
                return;
            }
            document.getElementById('overlayPanelTitle').innerText = displayTitle;
            document.getElementById('appIframeViewport').src = targetUrl;
            document.getElementById('playerOverlayFrame').style.display = 'block';
        }

        function shutOverlayViewer() {
            document.getElementById('playerOverlayFrame').style.display = 'none';
            document.getElementById('appIframeViewport').src = '';
        }

        window.onload = renderApplicationInterface;

        
</script>
</body>
</html>

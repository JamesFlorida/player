<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LineDance Player</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://imgur.com">
    <style>
        :root { --brand-green: #2ecc71; --dark-gray: #1e1e1e; --card-bg: #2b2b2b; --btn-blue: #34495e; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--dark-gray); color: white; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .header-bar { background-color: var(--brand-green); padding: 18px; text-align: center; font-weight: bold; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); letter-spacing: 0.5px; position: sticky; top: 0; z-index: 100; }
        .app-container { padding: 20px; max-width: 650px; margin: 0 auto; box-sizing: border-box; }
        .dance-entry-card { background: var(--card-bg); border-radius: 12px; padding: 22px; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); border-left: 5px solid var(--brand-green); }
        .title-line { font-size: 1.3rem; font-weight: bold; color: #ffffff; margin-bottom: 6px; text-align: center; }
        .meta-line { font-size: 0.95rem; color: #b3b3b3; margin-bottom: 22px; text-align: center; line-height: 1.4; }
        .button-bar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .action-touch-btn { background-color: var(--btn-blue); color: white; border: none; padding: 14px 2px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; cursor: pointer; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); transition: background 0.1s, transform 0.1s; text-decoration: none; display: block; }
        .action-touch-btn:active { background-color: var(--brand-green); transform: scale(0.96); }
        .action-touch-btn.disabled { background-color: #444; color: #777; cursor: not-allowed; box-shadow: none; pointer-events: none; }
        .inapp-overlay-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99999; }
        .overlay-control-header { background: #111111; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; border-bottom: 1px solid #333; }
        .overlay-title { font-weight: bold; color: #fff; font-size: 1rem; }
        .done-close-btn { background: var(--brand-green); color: white; border: none; padding: 9px 20px; font-weight: bold; font-size: 0.95rem; border-radius: 6px; cursor: pointer; }
        .overlay-viewport-iframe { width: 100%; height: calc(100% - 55px); border: none; background: white; }
    </style>
</head>
<body>
    <div class="header-bar">LineDance Player</div>
    <div class="app-container" id="danceListLayout"></div>
    <div id="playerOverlayFrame" class="inapp-overlay-window">
        <div class="overlay-control-header">
            <span class="overlay-title" id="overlayPanelTitle">Media Loader</span>
            <button class="done-close-btn" onclick="launchInAppBrowser()">Done</button>
        </div>
        <iframe id="appIframeViewport" class="overlay-viewport-iframe" src="" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>
    <script>
        const localDanceDatabase = [
            { id: "Stock1", group: "Sunday Night", name: "AA", choreographer: "Gary O'Reilly", song: "AA", artist: "Walker Hayes", steps: "", teach: "https://youtube.com", demo: "https://youtube.com", music: "" },
            { id: "Stock2", group: "Sunday Night", name: "Blue Night Cha", choreographer: "Kim Ray", song: "Blue Night", artist: "Michael Learns to Rock", steps: "", teach: "https://youtube.com", demo: "https://youtube.com", music: "" },
            { id: "Stock3", group: "Sunday Night", name: "Shotgun Jenny", choreographer: "Kathy Hunyadi", song: "Shotgun Jenny", artist: "Kevin Fowler", steps: "", teach: "https://youtube.com", demo: "https://youtube.com", music: "" }
        ];

        function renderDanceApplication() {
            const container = document.getElementById('danceListLayout');
            container.innerHTML = '';
            localDanceDatabase.forEach(track => {
                const card = document.createElement('div');
                card.className = 'dance-entry-card';
                const btnSteps = track.steps ? `<button class="action-touch-btn" onclick="openMediaOverlay('${track.steps}', '${track.name} - Steps')">Steps</button>` : `<button class="action-touch-btn disabled">None</button>`;
                const btnTeach = track.teach ? `<button class="action-touch-btn" onclick="openMediaOverlay('${track.teach}', '${track.name} - Teach')">Teach</button>` : `<button class="action-touch-btn disabled">None</button>`;
                const btnDemo = track.demo ? `<button class="action-touch-btn" onclick="openMediaOverlay('${track.demo}', '${track.name} - Demo')">Demo</button>` : `<button class="action-touch-btn disabled">None</button>`;
                const btnMusic = track.music ? `<button class="action-touch-btn" onclick="openMediaOverlay('${track.music}', '${track.name} - Play')">Music</button>` : `<button class="action-touch-btn disabled">None</button>`;
                card.innerHTML = `<div class="title-line">${track.name} • By: ${track.choreographer}</div><div class="meta-line">Song: ${track.song} - ${track.artist} (${track.group})</div><div class="button-bar-grid">${btnSteps}${btnTeach}${btnDemo}${btnMusic}</div>`;
                container.appendChild(card);
            });
        }

        function openMediaOverlay(targetUrl, displayTitle) {
            if(!targetUrl) return;
            document.getElementById('overlayPanelTitle').innerText = displayTitle;
            document.getElementById('appIframeViewport').src = targetUrl;
            document.getElementById('playerOverlayFrame').style.display = 'block';
        }

        function launchInAppBrowser() {
            document.getElementById('playerOverlayFrame').style.display = 'none';
            document.getElementById('appIframeViewport').src = '';
        }

        window.onload = renderDanceApplication;
    </script>
</body>
</html>
